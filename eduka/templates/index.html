{% extends 'base.html' %}
{% load static %}

{% block title %}Welcome to Eduka{% endblock %}

{% block content %}
<div id="carouselExample" class="carousel slide carousel-fade" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-data-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="{% static 'images/SL.png' %}" class="d-block w-100" style="height: 60vh; object-fit: cover; object-position: center; "  alt="First slide">
      <div class="carousel-caption d-none d-md-block">
        <h5>Learn Anything, Anywhere</h5>
        <p>Explore over 1,000+ online courses.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="{% static 'images/SG.png' %}" class="d-block w-100" style="height: 60vh; object-fit: cover; object-position: center;" alt="Second slide">
      <div class="carousel-caption d-none d-md-block">
        <h5>Learn from the Best</h5>
        <p>Courses taught by industry experts.</p>
      </div>
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>




{% endblock %}
