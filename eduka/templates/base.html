{% load static %}
<!--<!DOCTYPE html>-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} Eduka {% endblock%}</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.png' %}"/>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'main.css' %}">



<body>
 <header id="header" class="header sticky-top" style="background:#e6ffff;">
    <div class="branding d-flex align-items-cente">

      <div class="container position-relative d-flex align-items-center justify-content-between">
        <a href="{% url 'index'%}" class="logo d-flex align-items-center">
          <!-- Uncomment the line below if you also wish to use an image logo -->
          <!-- <img src="assets_index/img/logo.webp" alt=""> -->
          <h1 class="sitename text-primary" style="font-family:elephant">Eduka</h1>
        </a>

        <nav id="navmenu" class="navmenu">
          <ul>
            <li><a href="{% url 'index' %}" class="active">Home</a></li>
            <li><a href="{% url 'account' %}">Account</a></li>
            <li><a href="{% url 'cart_detail' %}">Cart</a></li>
             <li><a href="{% url 'product_list' %}">Products</a></li>
          </ul>
          <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
        </nav>
      </div>
    </div>
  </header>


    {% block content %}

    {% endblock%}

 <footer id="footer" class="footer light-background" style="background:#e6ffff;">

    <div class="container copyright text-center mt-4">
      <p>© <span>Copyright</span> <strong class="px-1 sitename">2026 EduKa Stationery.</strong> <span>All Rights Reserved</span></p>
      <div class="credits">
        Made with <i class="fa-solid fa-heart fa-beat" style="color: rgb(201, 11, 45);"></i> in Kenya

      </div>
    </div>

  </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}
    {% endblock scripts %}



</body>

</html>
