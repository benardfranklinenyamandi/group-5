<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Register</title>
	<link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body class="bg-primary">
<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="col-lg-5 bg-white p-5 rounded-4 shadow">
      <form method="POST" class="text-center">
		  {% csrf_token%}
		  <h2 class="fw-bold mb-4">Signup</h2>
		  <input type="email" name="email" placeholder="Email" class="form-control mb-3 py-2 bg-light">
		  <input type="password" name=" password" placeholder="Create password" class="form-control mb-3 py-2 bg-light">
		  <input type="password" name=" confirm_password" placeholder="Confirm password" class="form-control mb-4 py-2 bg-light">

		<button class="btn btn-primary w-100 py-2 mb-3 fw-semibold ">Signup</button>
		<p class="small text-muted">Already have an account ? <a href="{% url 'login' %}">Login here</a></p>
      </form>
    </div>

</div>
</body>
</html>
